<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SayBIM - Quiz</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- TensorFlow.js and MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    
    <script>
        window.CURRENT_LESSON_ID = parseInt("{{ lesson_id }}", 10);
        window.CURRENT_PAGE_TYPE = 'quiz';
    </script>
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: var(--bg-light); padding: 20px;">

    <div class="modal-content" style="position: relative; top: 0; transform: none; width: 95%; max-width: 1300px; height: 85vh; min-height: 650px; box-shadow: var(--shadow-medium); display: flex; flex-direction: column; overflow: hidden; padding: 0; border-radius: var(--radius-lg);">
        
        <!-- Inner Content Window -->
        <div style="display: flex; flex: 1; flex-direction: column; overflow-y: auto; padding: 40px; background: #fbfcfe;">
            
            <!-- Quiz Utilities Bar -->
            <div style="position: relative; display: flex; justify-content: flex-end; align-items: center; margin-bottom: 40px;">
                
                <!-- Grouped Progress Bar & Counter (Centered) -->
                <div style="position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 15px; width: 400px; max-width: 45%;">
                    <div class="progress-bar-bg" style="flex: 1; margin: 0;">
                        <div id="quiz-progress-bar" class="progress-bar-fill"
                            style="width: 10%; background: var(--accent-blue);"></div>
                    </div>
                    <div style="font-size: 0.9em; font-weight: bold; color: var(--text-secondary);">
                        <span id="question-counter">1</span>/10
                    </div>
                </div>

                <!-- Utilities (Hint, Heart & Close) -->
                <div style="display: flex; gap: 15px; align-items: center; z-index: 2;">
                    <button style="background: #fdfdfd; padding: 5px 15px; border-radius: 20px; border: 1px solid #eee; display: flex; align-items: center; font-size: 0.9em; box-shadow: var(--shadow-soft); cursor: pointer; transition: all 0.2s;"
                        onclick="toggleHint()" onmouseover="this.style.background='#f8f9fa'" onmouseout="this.style.background='#fdfdfd'">
                        <i class="fas fa-lightbulb" style="color: #ffc107; margin-right: 5px;"></i> Hint
                    </button>
                    <div style="background: #fdfdfd; padding: 5px 15px; border-radius: 20px; border: 1px solid #eee; display: flex; align-items: center; font-size: 0.9em; box-shadow: var(--shadow-soft);">
                        <i class="fas fa-heart" style="color: var(--accent-red); margin-right: 5px;"></i> <span id="heart-count">5</span>
                    </div>
                    
                    <!-- Inline Close Button -->
                    <button onclick="window.location.href='/'" style="background: #fee2e2; color: #ef4444; width: 36px; height: 36px; border-radius: 12px; display: flex; align-items: center; justify-content: center; transition: all 0.3s; box-shadow: 0 2px 10px rgba(239, 68, 68, 0.1); border: none; cursor: pointer;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
        <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; max-width: 600px; margin: 0 auto; width: 100%;">
            <div class="quiz-image" style="width: 220px; height: 220px; margin-bottom: 30px;">
                <i class="fas fa-hands-asl-interpreting" style="font-size: 5em; color: var(--text-secondary);"></i>
            </div>

            <h3 style="color: var(--text-primary); margin: 0 0 30px 0; font-size: 1.8em;">What does this sign mean?</h3>

            <div class="quiz-options" style="width: 100%; margin-top: 0;">
                <!-- Dynamically populated -->
            </div>
        </div>
        </div> <!-- Close Inner Content Window -->
    </div>

    <!-- Game Over Modal -->
    <div id="game-over-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content" style="max-width: 400px; text-align: center;">
            <div style="font-size: 3em; color: var(--text-secondary); margin-bottom: 20px;">
                <i class="fas fa-heart-broken"></i>
            </div>
            <h2 style="color: var(--text-primary);">Out of Hearts!</h2>
            <p style="color: var(--text-secondary); margin-bottom: 30px;">Refill hearts to continue?</p>

            <button class="quiz-btn" onclick="refillHearts()" style="width: 100%; background: var(--accent-blue); color: white; border: none; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <i class="fas fa-gem"></i> Pay 100 Gems
            </button>
            <button class="quiz-btn" onclick="window.location.href='/'" style="width: 100%; border: 2px solid #eee; color: var(--text-secondary); background: transparent;">
                Quit Lesson
            </button>
        </div>
    </div>

    <!-- Hint Popup -->
    <div id="hint-popup" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); z-index: 101; display: none; text-align: center;">
        <h4>Hint</h4>
        <div style="width: 100px; height: 100px; background: #eee; margin: 10px auto; display: flex; align-items: center; justify-content: center;">
            <i class="fas fa-hand-spock" style="font-size: 2em;"></i>
        </div>
        <p>Take your time and guess.</p>
        <button onclick="toggleHint()" style="background: var(--accent-blue); color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer;">Ok</button>
    </div>

    <!-- Camera Modal (for practice lessons) -->
    <div id="camera-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content" style="max-width: 700px; text-align: center;">
            <button class="modal-close" onclick="window.location.href='/'">
                <i class="fas fa-times"></i>
            </button>
            <h3 style="margin-bottom: 20px;">Gesture Verification</h3>

            <div style="position: relative; width: 100%; max-width: 600px; margin: 0 auto; background: #000; border-radius: 12px; overflow: hidden;">
                <video id="webcam" autoplay playsinline style="width: 100%; height: auto; display: block;"></video>
                <div id="camera-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; pointer-events: none;">
                    <div style="border: 2px dashed rgba(255,255,255,0.5); width: 60%; height: 70%; border-radius: 20px;"></div>
                </div>
            </div>

            <p id="camera-prompt" style="margin-top: 20px; color: var(--text-secondary);">Position your hand in the frame.</p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Forgot Password - SayBIM</title>
      <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="auth-body">
      <div class="auth-container">
            <div class="auth-card">
                  <div class="auth-header">
                        <div class="auth-logo">
                              <i class="fas fa-key"></i>
                        </div>
                        <h1>Forgot Password</h1>
                        <p>Verify your account to reset your password</p>
                  </div>

                  {% with messages = get_flashed_messages(with_categories=true) %}
                  {% if messages %}
                  <div class="alert-container">
                        {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">
                              {{ message }}
                              <button class="alert-close" onclick="this.parentElement.style.display='none';">&times;</button>
                        </div>
                        {% endfor %}
                  </div>
                  {% endif %}
                  {% endwith %}

                  <form action="{{ url_for('forgot_password') }}" method="POST" class="auth-form">
                        <div class="form-group">
                              <label for="identifier">Username or Email</label>
                              <div class="input-wrapper">
                                    <i class="fas fa-user-circle"></i>
                                    <input type="text" id="identifier" name="identifier"
                                          placeholder="Enter your username or email" required>
                              </div>
                        </div>
                        <button type="submit" class="auth-btn">Verify Account</button>
                  </form>

                  <div class="auth-footer">
                        <p>Remember your password? <a href="{{ url_for('login') }}">Login</a></p>
                  </div>
            </div>
      </div>
</body>

</html>

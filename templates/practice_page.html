<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SayBIM - Practice</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    
    <!-- Vercel Analytics -->
    <script defer src="/_vercel/insights/script.js"></script>

    <!-- TensorFlow.js and MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    
    <script>
        window.CURRENT_PAGE_TYPE = 'practice';
    </script>

    <style>
        .practice-step-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            background: var(--accent-blue-light);
            color: var(--accent-blue);
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 800;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .topic-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 30px;
            text-align: center;
            border: 2px solid #f1f5f9;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .topic-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-blue);
            box-shadow: 0 10px 25px rgba(66, 153, 225, 0.15);
        }

        .topic-icon-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        .practice-active-header {
            display: flex;
            align-items: center;
            gap: 15px;
            background: white;
            padding: 15px 25px;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            box-shadow: var(--shadow-soft);
            width: 100%;
        }
    </style>
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: var(--bg-light); padding: 20px;">

    <div class="modal-content" style="position: relative; top: 0; transform: none; width: 95%; max-width: 1300px; height: 85vh; min-height: 650px; box-shadow: var(--shadow-medium); display: flex; flex-direction: column; padding: 0; overflow: hidden; border-radius: var(--radius-lg);">
        
        <!-- Navbar / Header Area -->
        <div style="background: white; padding: 15px 40px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; z-index: 10;">
            <button onclick="window.location.href='/'" style="background: var(--bg-light); color: var(--text-primary); width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; transition: all 0.3s; border: 1px solid #e2e8f0; cursor: pointer; margin-right: 20px;" onmouseover="this.style.background='#edf2f7'" onmouseout="this.style.background='var(--bg-light)'">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h2 id="practice-main-title" style="margin: 0; color: var(--text-primary); font-size: 1.2em; font-weight: 800;">What would you like to <span style="color: var(--accent-blue);">practice</span> today?</h2>
        </div>

        <div style="display: flex; flex: 1; overflow: hidden; background: #fbfcfe;">
            
            <!-- Left Side: Interactive Area -->
            <div style="flex: 1.2; padding: 40px; display: flex; flex-direction: column; overflow-y: auto;">
                
                <!-- Target Selection Area -->
                <div id="practice-categories">
                    <div id="practice-target-btns" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 15px;">
                        <!-- Buttons A-L or 1-10 will be rendered here by JS -->
                    </div>
                </div>

                <!-- Reference Sign Image -->
                <div id="reference-sign-container" style="margin-top: 40px; display: none; text-align: center; background: white; padding: 25px; border-radius: var(--radius-md); border: 1px solid #f1f5f9; box-shadow: var(--shadow-soft);">
                    <h4 style="margin: 0 0 15px 0; color: var(--text-secondary); font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px;">Reference Sign</h4>
                    <div style="width: 100%; max-width: 300px; aspect-ratio: 1; margin: 0 auto; border-radius: var(--radius-sm); overflow: hidden; background: #f8fafc; display: flex; align-items: center; justify-content: center; border: 1px solid #e2e8f0;">
                        <img id="reference-sign-img" src="" alt="Reference Sign" style="width: 100%; height: 100%; object-fit: contain;">
                    </div>
                </div>


            </div>

            <!-- Right Side: Camera Area -->
            <div style="flex: 1.3; background: #f1f5f9; display: flex; align-items: center; justify-content: center; position: relative;">
                
                <!-- Initial State (No Camera) -->
                <div id="practice-placeholder" style="text-align: center; padding: 40px;">
                    <div style="width: 120px; height: 120px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px auto; font-size: 3em; color: #cbd5e1; box-shadow: var(--shadow-soft);">
                        <i class="fas fa-camera"></i>
                    </div>
                    <h3 style="color: var(--text-primary); margin-bottom: 10px;">Camera Ready</h3>
                    <p style="color: var(--text-secondary); max-width: 250px; margin: 0 auto;">Select a category on the left to activate the AI gesture recognition.</p>
                </div>

                <!-- Active Camera Container -->
                <div id="practice-camera-container" style="display: block; width: 100%; height: 100%; position: relative; background: #000;">
                    <video id="webcam" playsinline style="width: 100%; height: 100%; object-fit: cover; opacity: 0.6;"></video>
                    <canvas id="output_canvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></canvas>
                    
                    <!-- Maintenance Notice Overlay -->
                    <div id="maintenance-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); color: white; flex-direction: column; text-align: center; padding: 20px; z-index: 5;">
                        <i class="fas fa-tools" style="font-size: 3em; margin-bottom: 15px; color: var(--accent-yellow);"></i>
                        <h3 style="margin: 0; letter-spacing: 1px;">Maintenance Notice</h3>
                        <p style="margin: 10px 0 0 0; opacity: 0.8; font-size: 0.9em;">AI gesture recognition system is under tuning.<br>Please sign any valid letter to test.</p>
                    </div>

                    <!-- AI Status Indicator -->
                    <div id="camera-active-status" style="position: absolute; top: 25px; left: 25px; background: rgba(0,0,0,0.6); color: white; padding: 8px 15px; border-radius: 10px; font-size: 0.8em; display: none; align-items: center; gap: 8px; backdrop-filter: blur(5px); z-index: 10;">
                        <div style="width: 8px; height: 8px; background: #48BB78; border-radius: 50%; box-shadow: 0 0 10px #48BB78;"></div>
                        CAMERA ACTIVE
                    </div>

                    <!-- Instruction Prompt & Model Info -->
                    <div id="camera-prompt" style="position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 15px 30px; border-radius: 15px; text-align: center; backdrop-filter: blur(10px); z-index: 10; width: 80%; border: 1px solid rgba(255,255,255,0.1); display: none;">
                        Select a letter to begin
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Feedback Toasts Container -->
    <div id="toast-container"></div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>

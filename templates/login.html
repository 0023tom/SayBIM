<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Login - SayBIM</title>
      <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="auth-body">
      <div class="auth-container">
            <div class="auth-card">
                  <div class="auth-header">
                        <div class="auth-logo">
                              <i class="fas fa-hands-asl-interpreting"></i>
                        </div>
                        <h1>Welcome Back</h1>
                        <p>Continue your sign language journey</p>
                  </div>

                  {% with messages = get_flashed_messages(with_categories=true) %}
                  {% if messages %}
                  <div class="alert-container">
                        {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">
                              {{ message }}
                              <button class="alert-close" onclick="this.parentElement.style.display='none';">&times;</button>
                        </div>
                        {% endfor %}
                  </div>
                  {% endif %}
                  {% endwith %}

                  <form action="{{ url_for('login') }}" method="POST" class="auth-form">
                        <div class="form-group">
                              <label for="username">Username</label>
                              <div class="input-wrapper">
                                    <i class="fas fa-user"></i>
                                    <input type="text" id="username" name="username" placeholder="Enter your username"
                                          required>
                              </div>
                        </div>
                        <div class="form-group">
                              <label for="password">Password</label>
                              <div class="input-wrapper">
                                    <i class="fas fa-lock"></i>
                                    <input type="password" id="password" name="password"
                                          placeholder="Enter your password" required>
                              </div>
                        </div>
                        <button type="submit" class="auth-btn">Login</button>
                  </form>

                  <div class="auth-divider">OR</div>

                  <button type="button" class="google-btn" id="google-login-btn">
                        <svg viewBox="0 0 48 48" width="20px" height="20px" xmlns="http://www.w3.org/2000/svg">
                              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                              <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24s.92 7.54 2.56 10.78l7.97-6.19z"/>
                              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                              <path fill="none" d="M0 0h48v48H0z"/>
                        </svg>
                        Continue with Google
                  </button>

                  <div class="auth-footer">
                        <p>Don't have an account? <a href="{{ url_for('signup') }}">Sign Up</a></p>
                        <p style="margin-top: 12px;"><a href="{{ url_for('forgot_password') }}" style="color: var(--text-secondary); font-size: 0.85rem; font-weight: 500;">Forgot Password?</a></p>
                  </div>
            </div>
      </div>

      <!-- Firebase Client SDK -->
      <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
      <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

      <!-- Firebase Config Data Island -->
      <script id="firebase-config" type="application/json">
            {{ firebase_config | tojson | safe }}
      </script>

      <script>
            // Safely parse the config from the data island to avoid IDE linting errors
            const firebaseConfig = JSON.parse(document.getElementById('firebase-config').textContent);

            // Initialize Firebase
            if (!firebase.apps.length) {
                  firebase.initializeApp(firebaseConfig);
            }

            const auth = firebase.auth();
            const provider = new firebase.auth.GoogleAuthProvider();

            document.getElementById('google-login-btn').addEventListener('click', () => {
                  const googleBtn = document.getElementById('google-login-btn');
                  const originalHtml = googleBtn.innerHTML;
                  googleBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connecting...';
                  googleBtn.disabled = true;

                  auth.signInWithPopup(provider)
                        .then((result) => {
                              return result.user.getIdToken();
                        })
                        .then((idToken) => {
                              return fetch('/api/auth/google', {
                                    method: 'POST',
                                    headers: {
                                          'Content-Type': 'application/json'
                                    },
                                    body: JSON.stringify({ idToken: idToken })
                              });
                        })
                        .then(response => response.json())
                        .then(data => {
                              if (data.success) {
                                    window.location.href = data.redirect || '/';
                              } else {
                                    alert('Google Sign-In failed: ' + data.message);
                                    googleBtn.innerHTML = originalHtml;
                                    googleBtn.disabled = false;
                              }
                        })
                        .catch((error) => {
                              console.error('Error during Google Sign-In:', error);
                              googleBtn.innerHTML = originalHtml;
                              googleBtn.disabled = false;

                              if (error.code === 'auth/operation-not-allowed') {
                                    alert('ERROR: Google Auth is not enabled in your Firebase Console. Please go to Authentication -> Sign-in method and enable Google.');
                              } else if (error.code === 'auth/popup-closed-by-user') {
                                    // Silent fail
                              } else {
                                    alert('An error occurred: ' + error.message);
                              }
                        });
            });
      </script>
</body>

</html>
